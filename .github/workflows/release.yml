# 发布工作流:推送 v* tag 时构建 Windows 安装程序并上传到 GitHub Release。
# 应用内「检查更新」读取 Releases API,以此处上传的安装程序作为更新源。
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取版本号(去掉 tag 的 v 前缀)
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 校验 tag 与应用版本一致
        shell: pwsh
        run: |
          $tagVersion = "${{ steps.ver.outputs.version }}"
          $cargoVersion = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          if ($cargoVersion -ne $tagVersion) {
            throw "Cargo.toml 版本 $cargoVersion 与 tag 版本 $tagVersion 不一致"
          }

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存依赖
        uses: Swatinem/rust-cache@v2

      - name: 构建 Release 二进制
        run: cargo build --release

      - name: 打包 Windows 安装程序(Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.ver.outputs.version }} `
            installer\installer.iss

      - name: 提取 tag 附注作为更新说明
        id: notes
        shell: bash
        run: |
          # 附注 tag 的正文（首行为标题，跳过）作为 Release 更新描述；
          # 应用内「检查更新」对话框显示的即是该 body。轻量 tag 无正文时留空，
          # 由 generate_release_notes 自动补全。
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" 2>/dev/null || true
          git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}" > release_notes.md
          echo "打 tag 附注正文 $(wc -c < release_notes.md) 字节"

      - name: 创建 GitHub Release 并上传安装程序
        uses: softprops/action-gh-release@v2
        with:
          name: FerroxPlorer v${{ steps.ver.outputs.version }}
          files: installer/Output/FerroxPlorer-Setup-*.exe
          body_path: release_notes.md
          # tag 无附注正文时自动生成提交列表补全
          generate_release_notes: true
